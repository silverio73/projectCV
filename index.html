<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Premium - Funcional</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/html2pdf.js/dist/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1;
            --gradient-primary: linear-gradient(135deg, #6366f1, #8b5cf6, #d946ef);
            --shadow-neon: 0 0 30px rgba(99,102,241,0.4);
        }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a, #020617); min-height: 100vh; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .glass-card { background: rgba(15,23,42,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(99,102,241,0.2); border-radius: 28px; transition: all 0.3s; }
        .glass-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: var(--shadow-neon); }
        
        .login-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0f172a, #020617); display: flex; justify-content: center; align-items: center; z-index: 9999; padding: 20px; }
        .login-card { background: rgba(15,23,42,0.9); backdrop-filter: blur(20px); border-radius: 48px; padding: 50px 40px; width: 100%; max-width: 420px; border: 1px solid rgba(99,102,241,0.4); animation: fadeInUp 0.8s ease; text-align: center; }
        .login-logo i { font-size: 4em; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: pulseGlow 2s infinite; }
        .login-logo h1 { background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2em; }
        .input-icon { position: relative; margin-bottom: 20px; }
        .input-icon i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        .input-icon input { width: 100%; padding: 16px 20px 16px 45px; background: rgba(0,0,0,0.3); border: 1px solid rgba(99,102,241,0.4); border-radius: 30px; color: white; font-size: 16px; }
        .btn { padding: 14px 28px; border-radius: 30px; border: none; font-weight: 600; cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; gap: 10px; justify-content: center; }
        .btn-primary { background: var(--gradient-primary); color: white; width: 100%; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .btn-danger { background: #ef4444; color: white; }
        
        .app-container { display: none; }
        .sidebar { width: 280px; background: rgba(15,23,42,0.95); position: fixed; left: 0; top: 0; height: 100vh; border-right: 1px solid rgba(99,102,241,0.2); overflow-y: auto; }
        .sidebar-header { padding: 25px; text-align: center; border-bottom: 1px solid rgba(99,102,241,0.2); }
        .sidebar-header h2 { background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-item { padding: 14px 24px; margin: 8px 16px; border-radius: 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #94a3b8; transition: all 0.3s; }
        .nav-item:hover, .nav-item.active { background: rgba(99,102,241,0.15); color: var(--primary); transform: translateX(8px); }
        .main-content { margin-left: 280px; padding: 30px; animation: fadeInUp 0.6s ease; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 15px 25px; background: rgba(15,23,42,0.6); border-radius: 28px; }
        .page-title { font-size: 1.8rem; font-weight: 800; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .avatar-icon { width: 45px; height: 45px; background: var(--gradient-primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }
        
        .form-container { max-width: 900px; margin: 0 auto; }
        .form-section { background: rgba(15,23,42,0.6); border-radius: 28px; padding: 25px; margin-bottom: 25px; border: 1px solid rgba(99,102,241,0.2); transition: all 0.3s; }
        .form-section:hover { border-color: var(--primary); }
        .form-section h3 { margin-bottom: 20px; color: #a5b4fc; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #94a3b8; }
        .form-group input, .form-group textarea { width: 100%; padding: 14px; border-radius: 16px; border: 1px solid rgba(99,102,241,0.3); background: rgba(0,0,0,0.3); color: white; font-size: 14px; }
        .photo-circle { width: 150px; height: 150px; border-radius: 50%; background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(217,70,239,0.2)); border: 3px solid var(--primary); display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; margin: 0 auto 25px; }
        .photo-circle img { width: 100%; height: 100%; object-fit: cover; }
        .photo-circle i { font-size: 3em; color: #94a3b8; }
        .photo-input { display: none; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-generate { width: 100%; padding: 16px; font-size: 1.1rem; background: var(--gradient-primary); margin-top: 20px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .toast { position: fixed; bottom: 30px; right: 30px; background: var(--gradient-primary); color: white; padding: 15px 25px; border-radius: 16px; z-index: 2000; animation: slideInRight 0.4s ease; }
        .menu-toggle { display: none; position: fixed; top: 20px; left: 20px; z-index: 101; background: var(--primary); border: none; padding: 12px; border-radius: 12px; cursor: pointer; color: white; }
        .age-error { background: rgba(239,68,68,0.2); border: 1px solid #ef4444; border-radius: 16px; padding: 15px; margin-bottom: 20px; color: #ef4444; text-align: center; display: none; }
        @keyframes pulseGlow { 0%,100% { box-shadow: 0 0 10px rgba(99,102,241,0.3); } 50% { box-shadow: 0 0 35px rgba(99,102,241,0.7); } }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); position: fixed; z-index: 100; }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 20px; }
            .form-row { grid-template-columns: 1fr; }
            .menu-toggle { display: block; }
        }
    </style>
</head>
<body>
    <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    
    <!-- TELA DE LOGIN -->
    <div class="login-container" id="loginContainer">
        <div class="login-card">
            <div class="login-logo"><i class="fas fa-file-alt"></i><h1>CV Premium</h1><p style="color:#94a3b8;margin-top:10px;">Sistema de Criação de Currículos</p></div>
            <div class="input-icon"><i class="fas fa-user"></i><input type="text" id="loginUser" placeholder="Utilizador"></div>
            <div class="input-icon"><i class="fas fa-lock"></i><input type="password" id="loginPass" placeholder="Senha" onkeypress="if(event.key==='Enter') doLogin()"></div>
            <button class="btn btn-primary" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> Entrar</button>
        </div>
    </div>
    
    <!-- APP PRINCIPAL -->
    <div class="app-container" id="appContainer">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header"><h2>📄 CV PREMIUM</h2><p style="font-size:11px;color:#94a3b8;">Criador de Currículos 3D</p></div>
            <div class="nav-item" onclick="navigateTo('create')"><i class="fas fa-pen-fancy"></i> Criar CV</div>
            <div class="nav-item" onclick="navigateTo('myCvs')"><i class="fas fa-folder-open"></i> Meus CVs</div>
            <div class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</div>
        </div>
        
        <div class="main-content" id="mainContent">
            <div class="top-bar">
                <h1 class="page-title" id="pageTitle">Criar CV</h1>
                <div class="user-info"><span id="userName" style="color:white;"></span><div class="avatar-icon" id="userAvatar"></div></div>
            </div>
            <div id="dynamicContent"></div>
        </div>
    </div>
    <div id="toastContainer"></div>

    <script>
        // SEM SUPABASE - APENAS LOCALSTORAGE PARA GARANTIR QUE FUNCIONE
        let currentUser = null;
        let selectedPhotoBase64 = null;
        let savedCvs = JSON.parse(localStorage.getItem('cvs') || '[]');
        
        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${msg}`;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function calcularIdade(dataNascimento) {
            if (!dataNascimento) return 0;
            const hoje = new Date();
            const nasc = new Date(dataNascimento);
            let idade = hoje.getFullYear() - nasc.getFullYear();
            const mes = hoje.getMonth() - nasc.getMonth();
            if (mes < 0 || (mes === 0 && hoje.getDate() < nasc.getDate())) idade--;
            return idade;
        }
        
        // ========== LOGIN - 100% FUNCIONAL ==========
        window.doLogin = function() {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value;
            
            if (user === 'Oliveira' && pass === '7720') {
                currentUser = { name: 'Oliveira', role: 'admin' };
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('appContainer').style.display = 'block';
                document.getElementById('userName').innerHTML = '<i class="fas fa-crown"></i> Oliveira (Admin)';
                document.getElementById('userAvatar').innerHTML = 'O';
                navigateTo('create');
                showToast('Bem-vindo, Administrador!');
            } else {
                showToast('Credenciais inválidas! Tente: Oliveira / 7720', 'error');
            }
        };
        
        window.logout = function() {
            currentUser = null;
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('appContainer').style.display = 'none';
        };
        
        window.toggleSidebar = function() {
            document.getElementById('sidebar').classList.toggle('open');
        };
        
        window.navigateTo = function(view) {
            if (view === 'create') {
                document.getElementById('pageTitle').innerHTML = '✏️ Criar CV';
                showCreateForm();
            } else if (view === 'myCvs') {
                document.getElementById('pageTitle').innerHTML = '📁 Meus CVs';
                showMyCvs();
            }
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
            }
        };
        
        function salvarCv(cvData) {
            cvData.id = Date.now();
            cvData.created_at = new Date().toISOString();
            savedCvs.unshift(cvData);
            localStorage.setItem('cvs', JSON.stringify(savedCvs));
            return true;
        }
        
        function excluirCv(id) {
            if (!confirm('Tem certeza que deseja excluir este CV?')) return;
            savedCvs = savedCvs.filter(cv => cv.id !== id);
            localStorage.setItem('cvs', JSON.stringify(savedCvs));
            showToast('CV excluído!');
            showMyCvs();
        }
        
        // ========== PDF PROFISSIONAL COM ESPAÇAMENTO 1.5 E FONTES AJUSTADAS ==========
        function gerarPDF(cvData, foto) {
            const content = `
                <div style="font-family:'Inter', 'Segoe UI', sans-serif; max-width: 800px; margin: 0 auto; padding: 45px; background: white; color: #1e293b; line-height: 1.5; font-size: 12px;">
                    <!-- Cabeçalho com foto e nome -->
                    <div style="display: flex; gap: 35px; margin-bottom: 35px; align-items: center; border-bottom: 3px solid #6366f1; padding-bottom: 25px;">
                        <div style="width: 130px; height: 130px; border-radius: 50%; overflow: hidden; border: 4px solid #6366f1; box-shadow: 0 5px 20px rgba(99,102,241,0.3);">
                            ${foto ? `<img src="${foto}" style="width: 100%; height: 100%; object-fit: cover;">` : '<div style="width:100%;height:100%;background:linear-gradient(135deg,#6366f1,#d946ef);display:flex;align-items:center;justify-content:center;"><i class="fas fa-user" style="font-size: 3em; color: white;"></i></div>'}
                        </div>
                        <div style="flex:1;">
                            <h1 style="font-size: 28px; font-weight: 800; margin: 0 0 8px 0; background: linear-gradient(135deg, #6366f1, #d946ef); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">${cvData.fullName || 'Nome do Profissional'}</h1>
                            <p style="font-size: 16px; color: #64748b; margin: 0; font-weight: 500;">${cvData.title || 'Profissional'}</p>
                        </div>
                    </div>
                    
                    <!-- Corpo do Currículo em 2 colunas -->
                    <div style="display: grid; grid-template-columns: 1fr 1.8fr; gap: 35px;">
                        <!-- Coluna Esquerda -->
                        <div>
                            <!-- Contato -->
                            <div style="margin-bottom: 28px;">
                                <h3 style="font-size: 16px; font-weight: 700; color: #6366f1; margin-bottom: 12px; letter-spacing: -0.3px; border-left: 3px solid #6366f1; padding-left: 12px;">📞 CONTATO</h3>
                                <div style="line-height: 1.6;">
                                    <p style="margin: 6px 0;"><strong>Email:</strong> ${cvData.email || '—'}</p>
                                    <p style="margin: 6px 0;"><strong>Telefone:</strong> ${cvData.phone || '—'}</p>
                                    <p style="margin: 6px 0;"><strong>Telefone Alt:</strong> ${cvData.phoneAlt || '—'}</p>
                                    <p style="margin: 6px 0;"><strong>Endereço:</strong> ${cvData.address || '—'}</p>
                                    <p style="margin: 6px 0;"><strong>Casa:</strong> ${cvData.houseNumber || '—'} | <strong>Quarteirão:</strong> ${cvData.block || '—'}</p>
                                </div>
                            </div>
                            
                            <!-- Documentos -->
                            <div style="margin-bottom: 28px;">
                                <h3 style="font-size: 16px; font-weight: 700; color: #6366f1; margin-bottom: 12px; letter-spacing: -0.3px; border-left: 3px solid #6366f1; padding-left: 12px;">🆔 DOCUMENTOS</h3>
                                <div style="line-height: 1.6;">
                                    <p style="margin: 6px 0;"><strong>BI/Passaporte:</strong> ${cvData.documentId || '—'}</p>
                                    <p style="margin: 6px 0;"><strong>Naturalidade:</strong> ${cvData.naturality || '—'}</p>
                                    <p style="margin: 6px 0;"><strong>Nacionalidade:</strong> ${cvData.nationality || '—'}</p>
                                    <p style="margin: 6px 0;"><strong>Nascimento:</strong> ${cvData.birthDate || '—'}</p>
                                </div>
                            </div>
                            
                            <!-- Educação -->
                            <div style="margin-bottom: 28px;">
                                <h3 style="font-size: 16px; font-weight: 700; color: #6366f1; margin-bottom: 12px; letter-spacing: -0.3px; border-left: 3px solid #6366f1; padding-left: 12px;">🎓 FORMAÇÃO</h3>
                                <div style="line-height: 1.6;">
                                    <p style="margin: 6px 0;"><strong>10ª Classe:</strong> ${cvData.grade10 || '—'} (${cvData.grade10Year || '—'})</p>
                                    <p style="margin: 6px 0;"><strong>12ª Classe:</strong> ${cvData.grade12 || '—'} (${cvData.grade12Year || '—'})</p>
                                    <p style="margin: 6px 0;"><strong>Formação Superior:</strong><br>${cvData.higherEducation || '—'}</p>
                                </div>
                            </div>
                            
                            <!-- Habilidades -->
                            <div style="margin-bottom: 28px;">
                                <h3 style="font-size: 16px; font-weight: 700; color: #6366f1; margin-bottom: 12px; letter-spacing: -0.3px; border-left: 3px solid #6366f1; padding-left: 12px;">💼 HABILIDADES</h3>
                                <div style="line-height: 1.6;">
                                    <p style="margin: 6px 0; white-space: pre-line;">${cvData.skills || '—'}</p>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Coluna Direita -->
                        <div>
                            <!-- Sobre Mim -->
                            <div style="margin-bottom: 28px;">
                                <h3 style="font-size: 16px; font-weight: 700; color: #6366f1; margin-bottom: 12px; letter-spacing: -0.3px; border-left: 3px solid #6366f1; padding-left: 12px;">📝 SOBRE MIM</h3>
                                <div style="line-height: 1.6;">
                                    <p style="margin: 6px 0; text-align: justify;">${cvData.summary || '—'}</p>
                                </div>
                            </div>
                            
                            <!-- Experiência Profissional -->
                            <div style="margin-bottom: 28px;">
                                <h3 style="font-size: 16px; font-weight: 700; color: #6366f1; margin-bottom: 12px; letter-spacing: -0.3px; border-left: 3px solid #6366f1; padding-left: 12px;">💼 EXPERIÊNCIA</h3>
                                <div style="line-height: 1.6;">
                                    <p style="margin: 6px 0; white-space: pre-line; text-align: justify;">${cvData.experience || '—'}</p>
                                </div>
                            </div>
                            
                            <!-- Idiomas -->
                            <div style="margin-bottom: 28px;">
                                <h3 style="font-size: 16px; font-weight: 700; color: #6366f1; margin-bottom: 12px; letter-spacing: -0.3px; border-left: 3px solid #6366f1; padding-left: 12px;">🌐 IDIOMAS</h3>
                                <div style="line-height: 1.6;">
                                    <p style="margin: 6px 0; white-space: pre-line;">${cvData.languages || '—'}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Rodapé -->
                    <div style="margin-top: 35px; padding-top: 20px; border-top: 1px solid #e2e8f0; text-align: center; font-size: 10px; color: #94a3b8;">
                        <p>Currículo gerado via CV Premium • Documento oficial</p>
                    </div>
                </div>
            `;
            
            const opt = { 
                margin: [0.5, 0.5, 0.5, 0.5], 
                filename: `CV_${cvData.fullName || 'curriculo'}.pdf`, 
                image: { type: 'jpeg', quality: 0.98 }, 
                html2canvas: { scale: 2, letterRendering: true, useCORS: true }, 
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } 
            };
            const el = document.createElement('div');
            el.innerHTML = content;
            document.body.appendChild(el);
            html2pdf().set(opt).from(el).save().then(() => document.body.removeChild(el));
        }
        
        function showCreateForm() {
            const fotoHtml = selectedPhotoBase64 ? `<img src="${selectedPhotoBase64}">` : '<i class="fas fa-camera"></i>';
            
            document.getElementById('dynamicContent').innerHTML = `
                <div class="form-container">
                    <div id="ageErrorMsg" class="age-error"><i class="fas fa-exclamation-triangle"></i> Este modelo é para faixa etária de 17 anos a 50 anos apenas.</div>
                    <div class="form-section"><h3>📷 Foto de Perfil</h3>
                        <div class="photo-circle" onclick="document.getElementById('photoInput').click()">${fotoHtml}</div>
                        <input type="file" id="photoInput" class="photo-input" accept="image/*" onchange="previewPhoto(this)">
                    </div>
                    <div class="form-section"><h3>👤 Informações Pessoais</h3>
                        <div class="form-row"><div class="form-group"><label>Nome Completo *</label><input type="text" id="fullName" placeholder="Ex: João Silva"></div><div class="form-group"><label>Título Profissional</label><input type="text" id="title" placeholder="Ex: Engenheiro de Software"></div></div>
                        <div class="form-row"><div class="form-group"><label>Email</label><input type="email" id="email" placeholder="exemplo@email.com"></div><div class="form-group"><label>Telefone</label><input type="text" id="phone" placeholder="+258 84 123 4567"></div></div>
                        <div class="form-group"><label>Telefone Alternativo</label><input type="text" id="phoneAlt" placeholder="+258 84 123 4567"></div>
                        <div class="form-row"><div class="form-group"><label>Data Nascimento *</label><input type="date" id="birthDate" onchange="validarIdade()"></div><div class="form-group"><label>Idade</label><input type="text" id="idadeDisplay" readonly placeholder="Idade"></div></div>
                        <div class="form-row"><div class="form-group"><label>Nº Casa</label><input type="text" id="houseNumber" placeholder="Nº 123"></div><div class="form-group"><label>Quarteirão</label><input type="text" id="block" placeholder="QTO 5"></div></div>
                        <div class="form-group"><label>Endereço</label><input type="text" id="address" placeholder="Cidade, País"></div>
                    </div>
                    <div class="form-section"><h3>🆔 Documentação</h3>
                        <div class="form-row"><div class="form-group"><label>BI/Passaporte</label><input type="text" id="documentId" placeholder="Nº do documento"></div><div class="form-group"><label>Naturalidade</label><input type="text" id="naturality" placeholder="Cidade onde nasceu"></div></div>
                        <div class="form-group"><label>Nacionalidade</label><input type="text" id="nationality" placeholder="Ex: Moçambicana"></div>
                    </div>
                    <div class="form-section"><h3>🎓 Formação Académica</h3>
                        <div class="form-row"><div class="form-group"><label>10ª Classe (escola)</label><input type="text" id="grade10" placeholder="Nome da escola"></div><div class="form-group"><label>Ano 10ª</label><input type="text" id="grade10Year" placeholder="2020"></div></div>
                        <div class="form-row"><div class="form-group"><label>12ª Classe (escola)</label><input type="text" id="grade12" placeholder="Nome da escola"></div><div class="form-group"><label>Ano 12ª</label><input type="text" id="grade12Year" placeholder="2022"></div></div>
                        <div class="form-group"><label>Formação Superior</label><textarea id="higherEducation" rows="2" placeholder="Ex: Universidade Eduardo Mondlane - Informática (2022-2026)"></textarea></div>
                    </div>
                    <div class="form-section"><h3>💼 Experiência Profissional</h3><textarea id="experience" rows="5" placeholder="Ex: Desenvolvedor Full Stack na Empresa X (2022 - Presente)"></textarea></div>
                    <div class="form-section"><h3>💻 Habilidades</h3><textarea id="skills" rows="3" placeholder="Ex: JavaScript, Python, React, SQL"></textarea></div>
                    <div class="form-section"><h3>🌐 Idiomas</h3><textarea id="languages" rows="2" placeholder="Ex: Português (Nativo), Inglês (Avançado)"></textarea></div>
                    <div class="form-section"><h3>📝 Sobre Mim</h3><textarea id="summary" rows="4" placeholder="Resumo profissional..."></textarea></div>
                    <button class="btn btn-primary btn-generate" onclick="criarESalvarCV()"><i class="fas fa-download"></i> Gerar PDF e Salvar</button>
                </div>
            `;
        }
        
        window.validarIdade = function() {
            const birth = document.getElementById('birthDate').value;
            const errorMsg = document.getElementById('ageErrorMsg');
            const idadeDisplay = document.getElementById('idadeDisplay');
            if (birth) {
                const idade = calcularIdade(birth);
                idadeDisplay.value = idade + ' anos';
                if (idade < 17 || idade > 50) {
                    errorMsg.style.display = 'block';
                    return false;
                } else {
                    errorMsg.style.display = 'none';
                    return true;
                }
            }
            return true;
        };
        
        window.previewPhoto = function(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    selectedPhotoBase64 = e.target.result;
                    document.querySelector('.photo-circle').innerHTML = `<img src="${selectedPhotoBase64}">`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        };
        
        window.criarESalvarCV = function() {
            const birth = document.getElementById('birthDate')?.value;
            if (birth) {
                const idade = calcularIdade(birth);
                if (idade < 17 || idade > 50) {
                    document.getElementById('ageErrorMsg').style.display = 'block';
                    showToast('Idade não permitida! Apenas 17 a 50 anos.', 'error');
                    return;
                }
            }
            const cvData = {
                fullName: document.getElementById('fullName')?.value || '',
                title: document.getElementById('title')?.value || '',
                email: document.getElementById('email')?.value || '',
                phone: document.getElementById('phone')?.value || '',
                phoneAlt: document.getElementById('phoneAlt')?.value || '',
                houseNumber: document.getElementById('houseNumber')?.value || '',
                block: document.getElementById('block')?.value || '',
                address: document.getElementById('address')?.value || '',
                documentId: document.getElementById('documentId')?.value || '',
                naturality: document.getElementById('naturality')?.value || '',
                nationality: document.getElementById('nationality')?.value || '',
                birthDate: birth || '',
                grade10: document.getElementById('grade10')?.value || '',
                grade10Year: document.getElementById('grade10Year')?.value || '',
                grade12: document.getElementById('grade12')?.value || '',
                grade12Year: document.getElementById('grade12Year')?.value || '',
                higherEducation: document.getElementById('higherEducation')?.value || '',
                experience: document.getElementById('experience')?.value || '',
                skills: document.getElementById('skills')?.value || '',
                languages: document.getElementById('languages')?.value || '',
                summary: document.getElementById('summary')?.value || '',
                photo: selectedPhotoBase64 || ''
            };
            if (!cvData.fullName) { showToast('Preencha o nome completo!', 'error'); return; }
            if (!cvData.birthDate) { showToast('Preencha a data de nascimento!', 'error'); return; }
            salvarCv(cvData);
            gerarPDF(cvData, selectedPhotoBase64);
            showToast('CV salvo com sucesso!');
        };
        
        function showMyCvs() {
            if (savedCvs.length === 0) {
                document.getElementById('dynamicContent').innerHTML = `<div class="glass-card" style="padding:60px;text-align:center;"><i class="fas fa-folder-open" style="font-size:4em;color:#94a3b8;"></i><h3>Nenhum CV encontrado</h3><p>Crie seu primeiro currículo na aba "Criar CV"</p></div>`;
                return;
            }
            document.getElementById('dynamicContent').innerHTML = `<div style="display:grid;gap:20px;">${savedCvs.map(cv => `
                <div class="glass-card" style="padding:20px;">
                    <div class="flex-between">
                        <div><h3 style="color:white;">${cv.fullName}</h3><p style="color:#94a3b8;">${cv.title} | Criado em ${new Date(cv.created_at).toLocaleDateString()}</p></div>
                        <div style="display:flex;gap:10px;">
                            <button class="btn btn-outline" onclick="verCv(${cv.id})" style="padding:8px 16px;"><i class="fas fa-eye"></i> Ver</button>
                            <button class="btn btn-primary" onclick="regenerarPdf(${cv.id})" style="padding:8px 16px;"><i class="fas fa-download"></i> PDF</button>
                            <button class="btn btn-danger" onclick="excluirCv(${cv.id})" style="padding:8px 16px;"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            `).join('')}</div>`;
        }
        
        window.verCv = function(id) { const cv = savedCvs.find(c => c.id === id); if (cv) gerarPDF(cv, cv.photo); };
        window.regenerarPdf = function(id) { const cv = savedCvs.find(c => c.id === id); if (cv) gerarPDF(cv, cv.photo); };
        window.excluirCv = excluirCv;
    </script>
</body>
</html>
